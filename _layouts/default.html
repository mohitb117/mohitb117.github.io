<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="container nav-container">
        <a href="{{ '/' | relative_url }}" class="site-title">Mohit Bhalla</a>
        <ul class="nav-links">
          {% for item in site.navigation %}
            <li><a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.name }}</a></li>
          {% endfor %}
        </ul>
      </div>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} Mohit Bhalla. Built with Jekyll.</p>
    </div>
  </footer>
</body>
</html>
